<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrazione servizio online</title>
</head>
<body>

    <div>
        <h1>Registrazione al Servizio Online</h1>
    </div>

    <div>
        <h2>Benvenuto</h2>
        <p>Compila il seguente modulo per creare il tuo account e accedere ai servizi della piattaforma.</p>
        <p>I campi contrassegnati come <strong>obbligatori</strong> devono essere compilati, mentre alcune informazioni sono <em>facoltative</em>.</p>
    </div>

    <div>
        <h2>Modulo di registrazione</h2>

        <form action="#" method="post">

            <div>
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome" placeholder="Inserisci il tuo nome" required>
            </div>

            <div>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Inserisci la tua email" required>
            </div>

            <div>
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Inserisci una password" required>
            </div>

            <div>
                <p>Seleziona il tuo ruolo:</p>

                <input type="radio" id="studente" name="ruolo" value="studente" required>
                <label for="studente">Studente</label>

                <input type="radio" id="docente" name="ruolo" value="docente">
                <label for="docente">Docente</label>
            </div>

            <div>
                <label for="corso">Scegli un corso</label>
                <select id="corso" name="corso" required>
                    <option value="">-- Seleziona un corso --</option>
                    <option value="html">HTML Base</option>
                    <option value="css">CSS Base</option>
                    <option value="javascript">JavaScript Base</option>
                </select>
            </div>

            <div>
                <input type="checkbox" id="termini" name="termini" required>
                <label for="termini">Accetto i termini e le condizioni</label>
            </div>

            <div>
                <button type="submit">Registrati</button>
            </div>

        </form>
    </div>

</body>
</html>
