<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Esempi Form HTML e JS</title>
</head>
<body>

    <h1>Gestione Form</h1>

    <!-- =====================================
         FORM PRINCIPALE
    ====================================== -->

    <form id="formUtente">

        <!-- Input testo -->
        <label>Nome:</label>
        <input type="text" id="nome">

        <br><br>

        <!-- Input numero -->
        <label>Età:</label>
        <input type="number" id="eta">

        <br><br>

        <!-- Select -->
        <label>Città:</label>

        <select id="citta">

            <option value="">Seleziona</option>
            <option value="Torino">Torino</option>
            <option value="Milano">Milano</option>
            <option value="Roma">Roma</option>

        </select>

        <br><br>

        <!-- Checkbox -->
        <label>
            <input type="checkbox" id="privacy">
            Accetto privacy
        </label>

        <br><br>

        <!-- Radio -->
        <label>
            <input type="radio" name="sesso" value="Maschio">
            Maschio
        </label>

        <label>
            <input type="radio" name="sesso" value="Femmina">
            Femmina
        </label>

        <br><br>

        <!-- Textarea -->
        <label>Descrizione:</label>

        <br>

        <textarea id="descrizione"></textarea>

        <br><br>

        <!-- Bottone submit -->
        <button type="submit">
            Invia
        </button>

    </form>



    <!-- Output -->
    <div id="output"></div>



    <script>

        // =====================================
        // SELEZIONE ELEMENTI
        // =====================================

        let form = document.getElementById("formUtente");

        let nome = document.getElementById("nome");

        let eta = document.getElementById("eta");

        let citta = document.getElementById("citta");

        let privacy = document.getElementById("privacy");

        let descrizione = document.getElementById("descrizione");

        let output = document.getElementById("output");



        // =====================================
        // EVENTO SUBMIT FORM
        // =====================================

        form.addEventListener("submit", function (event) {

            // Blocca refresh automatico pagina
            event.preventDefault();



            // =====================================
            // LETTURA VALORI
            // =====================================

            let valoreNome = nome.value;

            let valoreEta = eta.value;

            let valoreCitta = citta.value;

            let valoreDescrizione = descrizione.value;



            // =====================================
            // LETTURA RADIO
            // =====================================

            let sesso = "";

            let radio = document.getElementsByName("sesso");

            for (let i = 0; i < radio.length; i++) {

                if (radio[i].checked) {

                    sesso = radio[i].value;

                }

            }



            // =====================================
            // CONTROLLI
            // =====================================

            if (valoreNome.trim() === "") {

                output.innerHTML = "Nome obbligatorio";

            } else if (privacy.checked === false) {

                output.innerHTML = "Devi accettare la privacy";

            } else {

                // =====================================
                // OUTPUT DATI
                // =====================================

                output.innerHTML = `
                    <h2>Dati inseriti</h2>

                    Nome: ${valoreNome} <br>
                    Età: ${valoreEta} <br>
                    Città: ${valoreCitta} <br>
                    Sesso: ${sesso} <br>
                    Descrizione: ${valoreDescrizione}
                `;

            }

        });

    </script>

</body>
</html>
